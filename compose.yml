# compose.yml
# Käivitamine:                docker compose up -d --build
# Peatamine:                  docker compose down
# Täielik puhastus (andmed):  docker compose down -v
# Logide vaatamine:           docker compose logs -f db

services:

  # PostgreSQL
  db:
    image: postgres:17-alpine
    container_name: ohukvaliteet-db
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${DB_PORT_HOST:-55432}:5432"
    volumes:
      - ./init:/docker-entrypoint-initdb.d:ro
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      retries: 5
      start_period: 10s
    restart: unless-stopped

volumes:
  pgdata: